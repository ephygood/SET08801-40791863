<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM Device Checker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a class="nav-button active" href="index.html">Home</a>
    <a class="nav-button" href="about.html">About Project</a>
  </nav>

  <main class="page-wrapper">
    <section class="hero-section">
      <h1>ATM Device Status Checker</h1>
      <p>Click an ATM device to check whether it is online or offline.</p>
    </section>

    <section class="status-panel" aria-live="polite">
      <h2 id="status-title">No ATM selected</h2>
      <p id="status-message">Choose one of the ATM devices below to view its current status.</p>
    </section>

    <section class="device-container" aria-label="ATM devices">
      <button class="device" type="button" data-name="Grand Anse ATM">
        <img src="images/atm-sign.svg" alt="Grand Anse ATM status icon" class="device-image">
        <span class="device-name">Grand Anse ATM</span>
        <span class="device-status">Click to check</span>
      </button>

      <button class="device" type="button" data-name="Melville St. ATM">
        <img src="images/atm-sign.svg" alt="Melville St. ATM status icon" class="device-image">
        <span class="device-name">Melville St. ATM</span>
        <span class="device-status">Click to check</span>
      </button>

      <button class="device" type="button" data-name="Gouyave ATM">
        <img src="images/atm-sign.svg" alt="Gouyave ATM status icon" class="device-image">
        <span class="device-name">Gouyave ATM</span>
        <span class="device-status">Click to check</span>
      </button>

      <button class="device" type="button" data-name="True Blue ATM">
        <img src="images/atm-sign.svg" alt="True Blue ATM status icon" class="device-image">
        <span class="device-name">True Blue ATM</span>
        <span class="device-status">Click to check</span>
      </button>

      <button class="device" type="button" data-name="Carenage ATM">
        <img src="images/atm-sign.svg" alt="Carenage ATM status icon" class="device-image">
        <span class="device-name">Carenage ATM</span>
        <span class="device-status">Click to check</span>
      </button>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
